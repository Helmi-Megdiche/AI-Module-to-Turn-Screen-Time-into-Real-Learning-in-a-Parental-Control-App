name: media_projection_creator
description: Vendored fork of media_projection_creator (API 33+ RECEIVER_NOT_EXPORTED for Android 14/15).
version: 1.0.0+patched3
homepage: https://github.com/patrick-fu/flutter_media_projection_creator

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:
  # This section identifies this Flutter project as a plugin project.
  # The 'pluginClass' and Android 'package' identifiers should not ordinarily
  # be modified. They are used by the tooling to maintain consistency when
  # adding or updating assets for this project.
  plugin:
    platforms:
      android:
        package: im.zego.media_projection_creator
        pluginClass: MediaProjectionCreatorPlugin
